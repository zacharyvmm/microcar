# dropped_vehicle_mode_frame â€” one gatewayâ†’powertrain frame dropped

name = "dropped_vehicle_mode_frame"
duration_ms = 2000

[[machine]]
id = 1
name = "gateway"
firmware = "firmware/gateway_ecu"
rtos = "freertos"

[[machine]]
id = 2
name = "powertrain"
firmware = "firmware/powertrain_ecu"
rtos = "freertos"

[[machine]]
id = 3
name = "bms"
firmware = "firmware/bms_ecu"
rtos = "freertos"

[[machine]]
id = 4
name = "dashboard"
firmware = "firmware/dashboard_ecu"
rtos = "freertos"

[[bus]]
name = "vcan0"
type = "can"
latency_us = 500

[[bus.node]]
bus = "vcan0"
machine = "gateway"
[[bus.node]]
bus = "vcan0"
machine = "powertrain"
[[bus.node]]
bus = "vcan0"
machine = "bms"
[[bus.node]]
bus = "vcan0"
machine = "dashboard"

[plant]
type = "microcar"
tick_ms = 10

[[input]]
at_ms = 100
type = "driver_input"
throttle_percent = 30
brake_pressed = false

[[fault]]
at_ms = 500
target = "bus.vcan0"
type = "drop_frame"
id = 0x010  # MC_MSG_VEHICLE_MODE

# Powertrain should NOT spike â€” keeps previous safe mode or times out
[[expect.event]]
before_ms = 1000
machine = "powertrain"
event = "motor_command"
# torque should not exceed previous limit from timeout/default
