# long_drive_10min — stress virtual-time fast-forward, check determinism

name = "long_drive_10min"
duration_ms = 600000

[[machine]]
id = 1
name = "gateway"
firmware = "firmware/gateway_ecu"
rtos = "freertos"

[[machine]]
id = 2
name = "powertrain"
firmware = "firmware/powertrain_ecu"
rtos = "freertos"

[[machine]]
id = 3
name = "bms"
firmware = "firmware/bms_ecu"
rtos = "freertos"

[[machine]]
id = 4
name = "dashboard"
firmware = "firmware/dashboard_ecu"
rtos = "freertos"

[[bus]]
name = "vcan0"
type = "can"
latency_us = 500

[[bus.node]]
bus = "vcan0"
machine = "gateway"
[[bus.node]]
bus = "vcan0"
machine = "powertrain"
[[bus.node]]
bus = "vcan0"
machine = "bms"
[[bus.node]]
bus = "vcan0"
machine = "dashboard"

[plant]
type = "microcar"
tick_ms = 10

[[input]]
at_ms = 1000
type = "driver_input"
throttle_percent = 30
brake_pressed = false

# 10 minutes of driving — expect deterministic final state
# and no wall-clock sleeps
