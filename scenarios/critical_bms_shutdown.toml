# critical_bms_shutdown — battery critical temperature forces FAULT mode

name = "critical_bms_shutdown"
duration_ms = 3000

[[machine]]
id = 1
name = "gateway"
firmware = "firmware/gateway_ecu"
rtos = "freertos"

[[machine]]
id = 2
name = "powertrain"
firmware = "firmware/powertrain_ecu"
rtos = "freertos"

[[machine]]
id = 3
name = "bms"
firmware = "firmware/bms_ecu"
rtos = "freertos"

[[machine]]
id = 4
name = "dashboard"
firmware = "firmware/dashboard_ecu"
rtos = "freertos"

[[bus]]
name = "vcan0"
type = "can"
latency_us = 500

[[bus.node]]
bus = "vcan0"
machine = "gateway"
[[bus.node]]
bus = "vcan0"
machine = "powertrain"
[[bus.node]]
bus = "vcan0"
machine = "bms"
[[bus.node]]
bus = "vcan0"
machine = "dashboard"

[plant]
type = "microcar"
tick_ms = 10

[[input]]
at_ms = 100
type = "driver_input"
throttle_percent = 40
brake_pressed = false

[[fault]]
at_ms = 1000
target = "plant.battery"
type = "force_temperature"
value_c = 95

[[expect.event]]
before_ms = 1500
machine = "bms"
event = "fault"
value = "CRITICAL_BMS_FAULT"

[[expect.event]]
before_ms = 1800
machine = "gateway"
event = "vehicle_mode"
value = "FAULT"

[[expect.event]]
before_ms = 2000
machine = "powertrain"
event = "motor_command"
torque = 0

[[expect.event]]
before_ms = 2000
machine = "dashboard"
event = "warning"
value = "CRITICAL_BMS_FAULT"

[expect]
trace = "../microcar/expected/traces/critical_bms_shutdown.trace"
