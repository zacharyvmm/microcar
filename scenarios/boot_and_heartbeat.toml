# boot_and_heartbeat — all 4 ECUs boot successfully

name = "boot_and_heartbeat"
duration_ms = 2000

[[machine]]
id = 1
name = "gateway"
firmware = "firmware/gateway_ecu"
rtos = "freertos"

[[machine]]
id = 2
name = "powertrain"
firmware = "firmware/powertrain_ecu"
rtos = "freertos"

[[machine]]
id = 3
name = "bms"
firmware = "firmware/bms_ecu"
rtos = "freertos"

[[machine]]
id = 4
name = "dashboard"
firmware = "firmware/dashboard_ecu"
rtos = "freertos"

[[bus]]
name = "vcan0"
type = "can"
latency_us = 500

[[bus.node]]
bus = "vcan0"
machine = "gateway"

[[bus.node]]
bus = "vcan0"
machine = "powertrain"

[[bus.node]]
bus = "vcan0"
machine = "bms"

[[bus.node]]
bus = "vcan0"
machine = "dashboard"

# ── Boot sequence: each ECU sends a heartbeat ────────────────────
# Gateway boots first, sends heartbeat at 50 ms.
[[bus_inject]]
at_ms = 50
bus = "vcan0"
sender = "gateway"
id = 0x001
data = [1, 50, 0, 0, 0]

# Powertrain boots at 20 ms, sends heartbeat at 70 ms.
[[bus_inject]]
at_ms = 70
bus = "vcan0"
sender = "powertrain"
id = 0x001
data = [2, 50, 0, 0, 0]

# BMS boots at 30 ms, sends heartbeat at 80 ms.
[[bus_inject]]
at_ms = 80
bus = "vcan0"
sender = "bms"
id = 0x001
data = [3, 50, 0, 0, 0]

# Dashboard boots at 40 ms, sends heartbeat at 90 ms.
[[bus_inject]]
at_ms = 90
bus = "vcan0"
sender = "dashboard"
id = 0x001
data = [4, 50, 0, 0, 0]

# Gateway repeats heartbeat at 150 ms.
[[bus_inject]]
at_ms = 150
bus = "vcan0"
sender = "gateway"
id = 0x001
data = [1, 150, 0, 0, 0]

[plant]
type = "microcar"
tick_ms = 10

[[expect.event]]
before_ms = 1000
machine = "gateway"
event = "node_online"
node = "bms"

[[expect.event]]
before_ms = 1000
machine = "gateway"
event = "node_online"
node = "powertrain"

[[expect.event]]
before_ms = 1000
machine = "gateway"
event = "node_online"
node = "dashboard"

[[expect.event]]
before_ms = 1500
machine = "gateway"
event = "vehicle_mode"
value = "READY"

[expect]
trace = "../expected/traces/boot_and_heartbeat.trace"
