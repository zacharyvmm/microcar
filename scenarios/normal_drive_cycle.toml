# normal_drive_cycle — basic drive with throttle only

name = "normal_drive_cycle"
duration_ms = 3000

[[machine]]
id = 1
name = "gateway"
firmware = "firmware/gateway_ecu"
rtos = "freertos"

[[machine]]
id = 2
name = "powertrain"
firmware = "firmware/powertrain_ecu"
rtos = "freertos"

[[machine]]
id = 3
name = "bms"
firmware = "firmware/bms_ecu"
rtos = "freertos"

[[machine]]
id = 4
name = "dashboard"
firmware = "firmware/dashboard_ecu"
rtos = "freertos"

[[bus]]
name = "vcan0"
type = "can"
latency_us = 500

[[bus.node]]
bus = "vcan0"
machine = "gateway"
[[bus.node]]
bus = "vcan0"
machine = "powertrain"
[[bus.node]]
bus = "vcan0"
machine = "bms"
[[bus.node]]
bus = "vcan0"
machine = "dashboard"

[plant]
type = "microcar"
tick_ms = 10

[[input]]
at_ms = 500
type = "driver_input"
throttle_percent = 30
brake_pressed = false

[[expect.event]]
before_ms = 1000
machine = "powertrain"
event = "motor_command"
torque = 30

[[expect.event]]
before_ms = 2000
machine = "dashboard"
event = "speed"
value = ">0"

[expect]
trace = "../expected/traces/normal_drive_cycle.trace"
