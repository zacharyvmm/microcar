# delayed_bms_fault_message — BMS fault frame delayed by 200ms

name = "delayed_bms_fault_message"
duration_ms = 3000

[[machine]]
id = 1
name = "gateway"
firmware = "firmware/gateway_ecu"
rtos = "freertos"

[[machine]]
id = 2
name = "powertrain"
firmware = "firmware/powertrain_ecu"
rtos = "freertos"

[[machine]]
id = 3
name = "bms"
firmware = "firmware/bms_ecu"
rtos = "freertos"

[[machine]]
id = 4
name = "dashboard"
firmware = "firmware/dashboard_ecu"
rtos = "freertos"

[[bus]]
name = "vcan0"
type = "can"
latency_us = 500

[[bus.node]]
bus = "vcan0"
machine = "gateway"
[[bus.node]]
bus = "vcan0"
machine = "powertrain"
[[bus.node]]
bus = "vcan0"
machine = "bms"
[[bus.node]]
bus = "vcan0"
machine = "dashboard"

[plant]
type = "microcar"
tick_ms = 10

[[input]]
at_ms = 100
type = "driver_input"
throttle_percent = 40
brake_pressed = false

[[fault]]
at_ms = 1000
target = "plant.battery"
type = "force_temperature"
value_c = 82

[[fault]]
at_ms = 1200
target = "bus.vcan0"
type = "delay_frame"
id = 0x202  # MC_MSG_BMS_FAULT
delay_ms = 200

[[expect.event]]
before_ms = 2000
machine = "gateway"
event = "vehicle_mode"
value = "LIMP"

[expect]
trace = "../microcar/expected/traces/delayed_bms_fault_message.trace"
