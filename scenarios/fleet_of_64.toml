# fleet_of_64 — 64-machine fleet extreme stress test
#
# STRESS TEST — not for CI. 64 machines on 8 CAN buses, central
# gateway bridging all buses. Exercises the extreme upper bound of
# the World event loop's O(n) scheduling across a very large machine
# set.  Wall-clock target: < 10s for 5s virtual time.
#
# Machine distribution:
#   - 1 gateway
#   - 32 powertrain ECUs (8 groups of 4)
#   - 16 BMS ECUs
#   - 8 dashboard ECUs
#   - 7 telemetry/logging ECUs
#
# To skip this test in CI, exclude this file from scenario discovery
# or run with: costar test --microcar --all --exclude fleet_of_64

name = "fleet_of_64"
duration_ms = 5000

# ── Gateway (central coordinator) ──
[[machine]]
id = 1
name = "gateway"
firmware = "firmware/gateway_ecu"
rtos = "freertos"

